version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sns-db
    environment:
      POSTGRES_USER: snsuser
      POSTGRES_PASSWORD: snspassword
      POSTGRES_DB: snsdb
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snsuser -d snsdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: sns-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://snsuser:snspassword@db:5432/snsdb?sslmode=disable
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: sns-frontend
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  db_data:
